# lefthook 配置：本地 pre-commit / pre-push 钩子
# 在提交前自动跑代码质量检查，与 CI 保持一致
# 使用 root: 让 {staged_files} 自动剥离前缀，与 cd 到子目录后的路径匹配

pre-commit:
  parallel: true
  jobs:
    - name: backend-ruff-check
      root: apps/backend/
      glob: "*.py"
      run: uv run ruff check {staged_files}
      stage_fixed: true

    - name: backend-ruff-format
      root: apps/backend/
      glob: "*.py"
      run: uv run ruff format --check {staged_files}

    - name: frontend-prettier
      root: apps/web/
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      run: pnpm prettier --check {staged_files}

    - name: frontend-lint
      root: apps/web/
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint {staged_files}

    - name: frontend-typecheck
      root: apps/web/
      glob: "*.{ts,tsx}"
      run: pnpm typecheck

pre-push:
  jobs:
    - name: backend-ruff
      root: apps/backend/
      run: uv run ruff check . && uv run ruff format --check .

    - name: frontend-lint
      root: apps/web/
      run: pnpm lint

    - name: frontend-typecheck
      root: apps/web/
      run: pnpm typecheck
