# 生产环境 compose（prod）
# - 使用 ghcr.io 上预构建的镜像（IMAGE_TAG 控制版本）
# - 数据库与 redis 不暴露端口，只在内网通信
# - 所有敏感字段走 Docker secrets，不出现在 environment
# - migrate 服务作为独立 job，启动后跑一次 alembic upgrade head
# - backend / web 端口 bind 到 host 127.0.0.1，由 host 上的 openresty / nginx
#   做 TLS 终止 + path-based 反代（/api/v1/* → backend，其它 → web）

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bf}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-bf_manager}
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bf} -d ${POSTGRES_DB:-bf_manager}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [internal]

  migrate:
    image: ghcr.io/g1331/bf-manager-backend:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      ENVIRONMENT: production
    # Settings 通过 secrets_dir=/run/secrets 自动按字段名读取这 3 个 secret 文件
    secrets:
      - database_url
      - ea_cred_encryption_key
      - jwt_secret_key
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  backend:
    image: ghcr.io/g1331/bf-manager-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: https://${DOMAIN:?DOMAIN required}
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      ENABLED_GAMES: bf1
      # 平台 admin 名单（逗号分隔 persona_id），从 host env / .env.prod 注入。
      # 这些用户每次登录都会被赋予 role="admin"，可访问 /admin/memberships
      # 与全量审计日志。改了之后重启 backend 即生效。
      ADMIN_PERSONA_IDS: ${ADMIN_PERSONA_IDS:-}
    # 仅绑 127.0.0.1，杜绝外网直连绕过 openresty
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
    # Settings 通过 secrets_dir=/run/secrets 自动按字段名读取这 3 个 secret 文件
    secrets:
      - database_url
      - ea_cred_encryption_key
      - jwt_secret_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  web:
    image: ghcr.io/g1331/bf-manager-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_API_URL: http://backend:8000
      NEXT_PUBLIC_DEFAULT_GAME: bf1
    # 仅绑 127.0.0.1，由 host openresty 反代
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      - backend
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redis-data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  database_url:
    file: ./secrets/database_url
  ea_cred_encryption_key:
    file: ./secrets/ea_cred_encryption_key
  jwt_secret_key:
    file: ./secrets/jwt_secret_key
